<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рахунок</title>

<style>
body{
font-family: Arial, sans-serif;
margin:40px;
color:#222;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
text-align:left;
border-bottom:2px solid #000;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.total{
text-align:right;
font-size:20px;
margin-top:30px;
}
</style>
</head>

<body>

<h1>Рахунок на оплату</h1>

<p><b>Номер рахунку:</b> {{invoiceNumber}}</p>
<p><b>Дата:</b> {{issueDate}}</p>

<h3>Постачальник</h3>
<p>{{companyName}}</p>

<h3>Платник</h3>
<p>{{clientName}}</p>

<table>
<tr>
<th>Опис</th>
<th>Кількість</th>
<th>Ціна</th>
<th>Сума</th>
</tr>

{{#items}}
<tr>
<td>{{description}}</td>
<td>{{quantity}}</td>
<td>{{price}}</td>
<td>{{total}}</td>
</tr>
{{/items}}

</table>

<div class="total">
Разом до сплати: {{total}}
</div>

<p style="margin-top:40px">
{{notes}}
</p>

</body>
</html>
